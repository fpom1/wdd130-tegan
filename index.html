<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>title</title>
    <link href="Styles/index.css" rel="stylesheet">
</head>

<body>

    <header>
        <a id="logo_link" href="index.html">
            <img class="logo" src="Images/logo.png" alt="logo image">
        </a>

        <nav>
            <button onclick="window.location.href='index.html'">Home</button>
            <button onclick="window.location.href='commanders.html'">Commanders</button>
            <button onclick="window.location.href='cardtype.html'">Cards</button>
        </nav>
    </header>
    <div class="image-container">
        <img src="Images/hero.jpg" alt="Example">
        <div class="text"></div>
    </div>
    <h1>
        Latest Articles
    </h1>

    <div class="container">
        <div class="grid-container" id="grid1"></div>
    </div>

    <h1>
        Top Decks
    </h1>

    <div class="container">
        <div class="grid-container" id="grid2"></div>
    </div>

    <script>
        //latest articles
        const articleTitles = [
            "Preorder Secrets of Strixhaven",
            "GO THERE AND BACK AGAIN"
        ];
        const articleDescription = [
            "Head back to school with Secrets of Strixhaven! Hit the books and prepare for the set's release on April 24, 2026.",
            "Join Bilbo’s adventure of a lifetime with Dwarves to befriend, Trolls to trick, Elves to outwit, and songs to sing. There's gold or dragon’s fire at the end, so enjoy the journey!",
        ];

        //top decks
        const deckTitles = [
            "Giada, Font of Hope Angels",
            "Nekusar, the Mindrazer",
            "Sythis, Harvest’s Hand",
            "Blood Pod",
        ];
        const deckDescriptions = [
            "I’ll be the first to admit that I’m a sucker for angels. They're one of the few creature types in Magic, including merfolk and elves, with just too much synergy. There are dozens more angels than you need, so you can pick from the cream of the crop of commanders and creatures.",
            "One of my first 3-color decks ever was Nekusar, the Mindrazer. It’s a powerful wheels-based deck that seeks to resolve its commander and other anti-card draw permanents like Underworld Dreams and Spiteful Visions, and to turn ordinary wheel cards into direct damage powerhouses",
            "I’m sure you’re no stranger to enchantress decks, but on the off chance that you are, picture this: You’re playing a dozen or so cards per turn, drawing three times as many, and only ending the turn because you’ve taken far longer than you should have. That’s how enchantress decks operate, and Sythis, Harvest's Hand is no different.",
            "Blood Pod is a 4-color Pod-based deck, and one of the most powerful cEDH builds I’ve managed to pilot; it’s always a major threat in any pod it’s in. It has the perfect mixture of powerful interaction, ways to get ahead, and enough combo potential that I’m always a little bit scared of what it’s going to do next.",
        ];
        function populateGrid(gridId, textArray, titlesArray) {
            const grid = document.getElementById(gridId);
            grid.innerHTML = "";

            for (let i = 0; i < textArray.length; i++) {
                const cell = document.createElement("div");
                cell.classList.add("grid-item");

                const title = document.createElement("div");
                title.classList.add("grid-title-text");
                title.textContent = titlesArray[i];

                const textContent = document.createElement("div");
                textContent.classList.add("grid-text-content");
                textContent.textContent = textArray[i];

                cell.appendChild(title);
                cell.appendChild(textContent);
                grid.appendChild(cell);
            }
        }


        // Populate grid
        populateGrid("grid1", articleDescription.slice(0, 2 * 1), articleTitles);
        populateGrid("grid2", deckDescriptions.slice(0, 2 * 2), deckTitles);
    </script>


    <footer>
        <p>stuff 2026</p>
        <a href="index.html">title</a>
    </footer>
</body>

</html>
